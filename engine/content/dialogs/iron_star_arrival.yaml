id: iron_star_arrival
title: IRON STAR
showOnce: true
bodyLines:
  - >-
    A long time ago, when you were a child, you learned Iron Stars would not exist for trillions upon trillions of years, until after the white dwarfs had gone black and quantum chance had done its patient work
  - >-
    Slightly less long ago, you learned that Iron Stars would never exist, as the life expectancy of this universe was hastily shortened by changes in the predicted collapse of expansion.
  - >-
    Today, you learned, yet again, that things that cannot be sometimes are, and that the universe continues to suprise.
  - >-
    The system around the Iron Star has a Dyson Shell in the habitable zone. Iron Stars don't have habitable zones.
  - >-
    Today will be a good day. You might not think of the past even once.
