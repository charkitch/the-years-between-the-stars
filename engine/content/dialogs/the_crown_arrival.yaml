id: the_crown_arrival
title: THE CROWN
showOnce: true
bodyLines:
  - >-
    You have heard of places like this. A topopolis. A tube world. A cylinder so long it wraps around its star in great looping coils, the interior surface alive with oceans and continents and weather of its own.
  - >-
    The scale is beyond anything you have seen. AU after AU of habitable surface, coiled around a star, home to trillions. Dyson shells are vast and still, catching light. This thing moves. It breathes. You can see clouds forming along its inner surface through the open ends, and the glint of cities where the tube curves away from you.
  - >-
    They call it The Crown. The coils catch the starlight and scatter it in ways that make the whole structure shimmer, a bright halo wound around a quiet yellow sun.
  - >-
    You are going to fly through it. You are not going to think about the engineering. You are going to fly through it and land somewhere and talk to someone who has never left.
